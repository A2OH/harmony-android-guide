{
    "jobs" : [{
            "name" : "boot",
            "cmds" : [
                "mkdir /data/service/el1/public/appspawnx 0711 root system",
                "mkdir /data/misc/appspawnx 0711 root root",
                "mkdir /data/misc/appspawnx/dalvik-cache 0711 root root",
                "mkdir /data/misc/appspawnx/dalvik-cache/arm 0711 root root"
            ]
        },
        {
            "name" : "init",
            "cmds" : [
                "mkdir /dev/pids",
                "mkdir /dev/pids/native",
                "mount cgroup none /dev/pids pids",
                "chown root appspawn /dev/pids",
                "chown root appspawn /dev/pids/tasks",
                "chown root appspawn /dev/pids/cgroup.procs",
                "chmod 0755 /dev/pids",
                "chmod 0755 /dev/pids/tasks",
                "chmod 0755 /dev/pids/cgroup.procs"
            ]
        }
    ],
    "services" : [{
            "name" : "appspawn-x",
            "_comment_path_diag" : "2026-05-06 DIAGNOSTIC (TEMPORARY — remove after Graphics OrDie root cause is fixed): wrap exec so parent stderr is redirected to /data/local/tmp/parent_appspawnx.stderr — captures libart LOG(FATAL) / __android_set_abort_message / OrDie failures (via libart_log_bridge.cpp's fprintf(stderr) double-write) before SIGABRT. Original: [\"/system/bin/appspawn-x\", \"--socket-name\", \"AppSpawnX\"]",
            "path" : ["/system/bin/sh", "-c", "exec /system/bin/appspawn-x --socket-name AppSpawnX 2>>/data/local/tmp/parent_appspawnx.stderr"],
            "importance" : -20,
            "uid" : "root",
            "gid" : ["root"],
            "writepid" : ["/dev/memcg/perf_sensitive/cgroup.procs"],
            "setuid" : true,
            "cgroup" : true,
            "socket" : [{
                "name" : "AppSpawnX",
                "family" : "AF_LOCAL",
                "type" : "SOCK_STREAM",
                "protocol" : "default",
                "permissions" : "0660",
                "uid" : "root",
                "gid" : "appspawn",
                "option" : [
                ]
            }],
            "sandbox" : 0,
            "_comment_ondemand" : "ondemand:true makes init listen() the AppSpawnX socket and lazily spawn this service when AMS connects. critical/disabled/start-mode must be absent (critical+ondemand are mutually exclusive in OH init). Verified working for B.40+ aa-start path 2026-04-29.",
            "ondemand" : true,
            "console" : 0,
            "secon" : "u:r:appspawn:s0",
            "env" : [
                {
                    "name" : "ANDROID_ROOT",
                    "value" : "/system/android"
                },
                {
                    "name" : "ANDROID_DATA",
                    "value" : "/data"
                },
                {
                    "name" : "ANDROID_BOOT_IMAGE",
                    "value" : "/system/android/framework/boot.art"
                },
                {
                    "name" : "ANDROID_I18N_ROOT",
                    "value" : "/system/android"
                },
                {
                    "name" : "ANDROID_TZDATA_ROOT",
                    "value" : "/system/android"
                },
                {
                    "name" : "ICU_DATA",
                    "value" : "/system/android/etc/icu"
                },
                {
                    "name" : "APPSPAWNX_FAST_DEV",
                    "value" : "1"
                },
                {
                    "_comment" : "2026-05-06 — 重启用 CheckJNI 做诊断 baseline。第二轮发现死循环根因不是 CheckJNI 本身，是叠加 -verbose:abort,jni,threads,startup 让 ART trace 量级爆炸；现已移除 verbose:* 启用代码，CheckJNI 单独启用是安全的（第一轮验证 helloworld 跑过 activityResumed rc=0，与未启用同进度）。诊断完后改回 0。",
                    "name" : "APPSPAWNX_CHECK_JNI",
                    "value" : "1"
                },
                {
                    "name" : "LD_LIBRARY_PATH",
                    "value" : "/system/android/lib:/system/lib/chipset-sdk-sp:/system/lib:/system/lib/platformsdk"
                }
            ]
        }
    ]
}
