# Westlake CR27 (2026-05-13) -- noice.discover.properties
#
# Per-app configuration for NoiceDiscoverWrapper.  Extracted from the
# hard-coded constants in NoiceDiscoverWrapper.java (post-CR24).  All
# phase orchestration is in DiscoverWrapperBase.java; this file is the
# ONLY place noice-specific data lives in the discovery harness.
#
# Deploy path on phone: /data/local/tmp/westlake/noice.discover.properties
#
# Schema (see DiscoverWrapperBase.loadManifest):
#   app.packageName        -- AndroidManifest <manifest package=>
#   app.apkPath            -- absolute path to deployed .apk on phone
#   app.applicationClass   -- AndroidManifest <application android:name=>
#   app.mainActivityClass  -- main launcher activity class FQN
#   app.targetSdkVersion   -- compile/target SDK (int)
#   app.dataDir            -- writable data dir override (optional;
#                              default /data/local/tmp/westlake/<packageName>)
#   phase.probeServices    -- (optional) comma-separated probe-service names
#                              override.  Empty = use base class defaults
#                              (curated list of ~70 typical Android services).
#   phase.classloadCandidates -- (optional) comma-separated FQNs to probe
#                              in PHASE B (in addition to app.applicationClass
#                              and app.mainActivityClass).

app.packageName=com.github.ashutoshgngwr.noice
app.apkPath=/data/local/tmp/westlake/com_github_ashutoshgngwr_noice.apk
app.applicationClass=com.github.ashutoshgngwr.noice.NoiceApplication
app.mainActivityClass=com.github.ashutoshgngwr.noice.activity.MainActivity
app.targetSdkVersion=33

# Mirror the original NoiceDiscoverWrapper PHASE B candidates list -- these
# are the classes that gave the richest discovery signal pre-CR27.
phase.classloadCandidates=com.github.ashutoshgngwr.noice.NoiceApplication,com.github.ashutoshgngwr.noice.Hilt_NoiceApplication,com.github.ashutoshgngwr.noice.activity.MainActivity,com.github.ashutoshgngwr.noice.activity.Hilt_MainActivity,com.github.ashutoshgngwr.noice.fragment.HomeFragment,dagger.hilt.android.internal.managers.ApplicationComponentManager,dagger.hilt.android.HiltAndroidApp
