# Westlake CR27 (2026-05-13) -- mcd.discover.properties
#
# Per-app configuration for McdDiscoverWrapper.  Second consumer of the
# DiscoverWrapperBase harness (proves the CR27 refactor is reusable).
#
# Subject: com.mcdonalds.app (Real McD Android 15 client).  Manifest
# values were extracted from the apktool-decoded AndroidManifest.xml at:
#   /home/dspfac/android-to-openharmony-migration/artifacts/real-mcd/
#       apktool_decoded/AndroidManifest.xml
#
# Specifically:
#   <manifest package="com.mcdonalds.app" compileSdk=35>
#   <application android:name="com.mcdonalds.app.application.McDMarketApplication"
#                android:appComponentFactory="androidx.core.app.CoreComponentFactory"
#                android:theme="@style/AppTheme">
#   <activity android:name="com.mcdonalds.mcdcoreapp.common.activity.SplashActivity"
#             ... intent-filter android.intent.action.MAIN
#             ... category android.intent.category.LAUNCHER>
#
# APK path: as-deployed on phone, mirroring the noice deployment pattern
# (push to /data/local/tmp/westlake/<sanitized_packagename>.apk).
#
# Deploy path on phone: /data/local/tmp/westlake/mcd.discover.properties

app.packageName=com.mcdonalds.app
app.apkPath=/data/local/tmp/westlake/com_mcdonalds_app.apk
app.applicationClass=com.mcdonalds.app.application.McDMarketApplication
app.mainActivityClass=com.mcdonalds.mcdcoreapp.common.activity.SplashActivity
app.targetSdkVersion=35

# Classload probe candidates curated from the apktool decoded smali
# directory layout + AndroidManifest entries.  These are the highest-value
# classes to verify resolve through the McD APK's PathClassLoader:
#   * The Application class itself.
#   * SplashActivity (the LAUNCHER).
#   * androidx.core.app.CoreComponentFactory (manifest appComponentFactory).
#   * com.google.android.gms.auth.api.signin.internal.SignInHubActivity
#     (well-known Play Services class -- proves the embedded gms dependency
#     is resolvable).
phase.classloadCandidates=com.mcdonalds.app.application.McDMarketApplication,com.mcdonalds.mcdcoreapp.common.activity.SplashActivity,com.mcdonalds.mcdcoreapp.common.activity.ROAInAppDeeplinkNotificationActivity,com.mcdonalds.mcdcoreapp.about.activity.AboutActivity,com.mcdonalds.mcdcoreapp.helpcenter.HelpCenterActivity,androidx.core.app.CoreComponentFactory,com.google.android.gms.auth.api.signin.internal.SignInHubActivity
